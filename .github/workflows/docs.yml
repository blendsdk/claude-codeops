name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Fall back to whichever attempt actually deployed.
      url: ${{ steps.attempt1.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      # The Pages backend intermittently returns "Deployment failed, try again
      # later." on the first status poll. Absorb one transient failure instead
      # of forcing a manual re-run.
      - id: attempt1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retrying the deploy
        if: steps.attempt1.outcome == 'failure'
        run: sleep 30
      - id: deployment
        if: steps.attempt1.outcome == 'failure'
        uses: actions/deploy-pages@v5
